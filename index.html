<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDG Portal | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="neon-bg">
    <canvas id="techCanvas"></canvas>
    <div class="login-container">
        <h1 class="neon-text glow-cyan">SDG 17 Portal</h1>
        <p class="subtitle glow-magenta">Enter the Hackathon Matrix</p>
        
        <form id="loginForm" class="neon-form glow-border-cyan">
            <div class="input-group">
                <label for="name" class="glow-cyan">Name</label>
                <input type="text" id="name" required placeholder="Enter your name">
            </div>
            <div class="input-group">
                <label for="email" class="glow-cyan">Email</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>
            <div class="input-group">
                <label for="password" class="glow-cyan">Password</label>
                <input type="password" id="password" required placeholder="Enter secret code">
            </div>
            <button type="submit" class="neon-btn glow-btn-cyan">INITALIZE SEQUENCE</button>
        </form>

        <footer class="credits glow-green">
            <p>Created by: <strong>S R M HARINNETHRAN</strong>, <strong>T.GOKUL</strong></p>
            <p class="team-name glow-magenta">TEAM: NEONS CORE</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
