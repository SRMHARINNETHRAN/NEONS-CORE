<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDG Portal | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="neon-bg">
    <canvas id="techCanvas"></canvas>
    <header class="header glow-border-bottom-magenta">
        <h1 class="neon-text glow-magenta">Global Goals Matrix</h1>
        <div class="user-info glow-cyan" id="userInfo">Welcome, Hacker</div>
        <button id="logoutBtn" class="neon-btn glow-btn-red small-btn">ABORT</button>
    </header>

    <main class="dashboard-container">
        <div class="goals-grid" id="goalsGrid">
            <!-- Goals injected dynamically via JS -->
        </div>
        
        <section class="map-section box-glow-cyan" style="margin-top: 4rem; padding: 2rem; border-radius: 12px; background: rgba(0,0,0,0.6);">
            <h2 class="neon-text glow-cyan orbitron" style="margin-bottom: 1.5rem; text-align: center; letter-spacing: 2px;">GLOBAL CLIMATE TRACKER [LIVE]</h2>
            <div class="map-container" style="position: relative; padding-bottom: 45%; height: 0; overflow: hidden; border-radius: 8px; border: 2px solid var(--neon-cyan); box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);">
                <iframe src="https://maps.google.com/maps?q=11.5195519,78.3718026&z=12&t=k&output=embed" width="100%" height="100%" style="border:0; position: absolute; top:0; left:0; filter: invert(90%) hue-rotate(180deg) contrast(110%) saturate(150%);" allowfullscreen="" loading="lazy"></iframe>
            </div>
            <p style="text-align: center; margin-top: 1rem; color: var(--neon-cyan); font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 1px;">SATELLITE FEED SECURED: MONITORING CLIMATE SHIFTS</p>
        </section>
    </main>

    <footer class="credits glow-green">
        <p>Created by: <strong>S R M HARINNETHRAN</strong>, <strong>T.GOKUL</strong></p>
        <p class="team-name glow-cyan">TEAM: NEONS CORE</p>
    </footer>

    <!-- NEONS AI Assistant Widget -->
    <div class="ai-widget-container" id="aiWidget">
        <button id="toggleAiBtn" class="neon-btn glow-btn-cyan ai-fab">
            <span class="orbitron">NEONS AI CORE</span>
        </button>
        <div class="ai-chat-window box-glow-cyan" id="aiChatWindow" style="display: none;">
            <div class="ai-chat-header glow-border-bottom-magenta">
                <span class="orbitron neon-text glow-cyan">NEONS TERMINAL</span>
                <button id="closeAiBtn" class="neon-btn small-btn glow-btn-red">&times;</button>
            </div>
            <div class="ai-chat-body" id="aiChatBody">
                <div class="ai-msg bot"><span class="glow-cyan">NEONS:</span> Hacker recognized. I am your integrated SDG advisor matrix. What is your query?</div>
            </div>
            <div class="ai-chat-input">
                <input type="text" id="aiInput" class="glow-border-cyan" placeholder="Transmission..." autocomplete="off"/>
                <button id="sendAiBtn" class="neon-btn glow-btn-cyan small-btn">SEND</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        window.onload = () => {
            initDashboard();
        };
    </script>
</body>
</html>
